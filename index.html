<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Stopwatch</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="stopwatch-card">
        <h1>Stopwatch</h1>
        <div class="display">
          <span id="minutes">00</span>:<span id="seconds">00</span>:<span
            id="milliseconds"
            >00</span
          >
        </div>

        <div class="controls">
          <button id="startBtn" class="btn start">Start</button>
          <button id="pauseBtn" class="btn pause" disabled>Pause</button>
          <button id="lapBtn" class="btn lap" disabled>Lap</button>
          <button id="resetBtn" class="btn reset">Reset</button>
        </div>

        <ul id="lapsList" class="laps"></ul>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
